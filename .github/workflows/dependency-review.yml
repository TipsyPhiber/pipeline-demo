name: Dependency Review

# Software composition analysis on the PR diff: blocks PRs that introduce
# vulnerable dependencies or disallowed licenses before they reach main.
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # to post the summary comment on the PR

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
