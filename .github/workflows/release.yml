name: Release

# Supply-chain core. The job order IS a security control:
#   build locally -> scan -> (only if clean) push -> sign -> attest provenance.
# Scanning before push means the registry never holds a known-vulnerable image.
on:
  push:
    branches: [main]
    tags: ["v*"]

# Default to read-only; the job below grants exactly the extra scopes it needs.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to GHCR
      id-token: write # OIDC token for keyless cosign signing
      attestations: write # store build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Compute lowercase image reference
        # GHCR requires a lowercase path; the owner (TipsyPhiber) is mixed-case.
        run: echo "IMAGE=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      # 1) Build locally (load into the runner's docker, do NOT push yet).
      - name: Build image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          load: true
          tags: app:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) Scan the local image. Fail the job on HIGH/CRITICAL so nothing
      #    known-bad ever gets pushed. ignore-unfixed avoids failing on vulns
      #    that have no patch available (tracked, not blocking).
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: app:scan
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # 3) Only now authenticate to the registry.
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4) Push. Reuses the cached layers from the scan build, so it's fast.
      - name: Push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5) Sign the pushed image keylessly via OIDC — no signing key to leak.
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # 6) Generate SLSA build provenance so consumers can verify what was built
      #    and where it came from.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
