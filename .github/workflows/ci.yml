name: CI

# Fast feedback on every push and PR: style lint, security lint, and tests.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Security lint (bandit)
        # Scans the project's own code for insecure patterns (e.g. shell
        # injection, unsafe deserialization) before anything is built or shipped.
        run: bandit -r app

      - name: Run tests
        run: pytest -q
